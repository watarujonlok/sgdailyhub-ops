<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG O-Level Practice Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="lockScreen" class="card center">
      <h1>SG O-Level Practice Hub</h1>
      <p class="muted">Protected access</p>
      <input id="passwordInput" type="password" placeholder="Enter password" />
      <button id="unlockBtn">Unlock</button>
      <p id="lockMsg" class="error"></p>
    </section>

    <section id="examScreen" class="hidden">
      <header class="topbar">
        <div>
          <h2>O/N-Level Hard Exam Trainer (SG Style)</h2>
          <p id="apiStatus" class="muted">Real-time AI marker: checking...</p>
        </div>
        <button id="logoutBtn" class="ghost">Lock</button>
      </header>

      <div class="controls card">
        <label for="subjectSelect">Select subject set</label>
        <select id="subjectSelect"></select>
        <button id="startBtn">Start / New Set</button>
      </div>

      <div id="loading" class="card hidden">Please wait...</div>

      <form id="questionForm" class="card hidden"></form>

      <div id="resultCard" class="card hidden">
        <h3 id="scoreText"></h3>
        <p>Type <b>ok</b> below to generate a reshuffled new paper.</p>
        <div class="okRow">
          <input id="okInput" placeholder="Type ok" />
          <button id="okBtn" type="button">Submit</button>
        </div>
      </div>
    </section>
  </main>

  <div id="giftModal" class="hidden gift-modal">
    <div style="width:min(92vw,520px);background:#191d24;border:1px solid #2b3240;border-radius:14px;padding:16px;">
      <h3 style="margin-top:0">🏆 Perfect Score — Gift Claim</h3>
      <p class="muted">You scored 100%. Enter your Telegram handle and submit for gift processing.</p>
      <input id="giftHandle" placeholder="@yourusername" style="width:100%;margin:8px 0 10px 0" />
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="giftCancel" class="ghost" type="button">Cancel</button>
        <button id="giftSubmit" type="button">Submit Claim</button>
      </div>
      <p id="giftMsg" class="muted" style="margin-bottom:0"></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
